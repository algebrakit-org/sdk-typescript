<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgebraKit TypeScript SDK - Web Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 { color: #333; }
        .error {
            background: #fee;
            border: 1px solid #c00;
            padding: 12px;
            border-radius: 4px;
            color: #900;
            margin: 20px 0;
        }
        .exercise-container {
            margin: 20px 0;
        }
        #event-log {
            margin-top: 40px;
            border: 1px solid #ccc;
            border-radius: 4px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
        }
        #event-log h2 {
            margin: 0;
            padding: 10px 12px;
            font-size: 14px;
            background: #f5f5f5;
            border-bottom: 1px solid #ccc;
            position: sticky;
            top: 0;
        }
        .event-entry {
            border-bottom: 1px solid #eee;
        }
        .event-entry:last-child {
            border-bottom: none;
        }
        .event-header {
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .event-header:hover {
            background: #f9f9f9;
        }
        .event-toggle {
            display: inline-block;
            width: 16px;
            margin-right: 6px;
            color: #999;
            font-size: 11px;
        }
        .event-name {
            font-weight: bold;
            color: #0066cc;
        }
        .event-time {
            color: #999;
            margin-left: 8px;
        }
        .event-data {
            padding: 4px 12px 8px 34px;
            color: #555;
            white-space: pre-wrap;
            word-break: break-all;
            display: none;
        }
        .event-entry.expanded .event-data {
            display: block;
        }
        .event-entry.expanded .event-toggle {
            transform: rotate(90deg);
        }
    </style>
</head>
<body>

    <!-- AlgebraKit configuration (must be set BEFORE loading the widget script) -->
    <script>
        AlgebraKIT = {
            config: {
                proxy: {
                    url: '{{PROXY_URL}}'
                }
            }
        };
    </script>

    <!-- Load AlgebraKit widget script -->
    <script src="{{WIDGET_URL}}"></script>

    <h1>AlgebraKit TypeScript SDK - Web Demo</h1>

    {{EXERCISE_CONTENT}}

    <div id="event-log">
        <h2>Learning Events</h2>
    </div>

    <script>
        AlgebraKIT.addExerciseListener(function (evt) {
            var log = document.getElementById('event-log');
            var entry = document.createElement('div');
            entry.className = 'event-entry';

            var time = new Date().toLocaleTimeString();
            var dataObj = Object.assign({}, evt);
            delete dataObj.event;
            var dataStr = JSON.stringify(dataObj, null, 2);

            entry.innerHTML =
                '<div class="event-header" onclick="this.parentElement.classList.toggle(\'expanded\')">' +
                    '<span class="event-toggle">&#9654;</span>' +
                    '<span class="event-name">' + evt.event + '</span>' +
                    '<span class="event-time">' + time + '</span>' +
                '</div>' +
                '<div class="event-data">' + dataStr + '</div>';

            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        });
    </script>

</body>
</html>
